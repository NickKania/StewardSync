name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: commit SHA)'
        required: false
        type: string

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        id: tags
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            TAG="${GITHUB_SHA::7}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building images with tag: ${TAG}"

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/stewardsync
          tags: |
            type=raw,value=frontend-${{ steps.tags.outputs.tag }}
            type=raw,value=frontend-latest,enable={{is_default_branch}}

      - name: Extract metadata for deployer
        id: meta-deployer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/stewardsync
          tags: |
            type=raw,value=deployer-${{ steps.tags.outputs.tag }}
            type=raw,value=deployer-latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ steps.tags.outputs.tag }}
            org.opencontainers.image.title=StewardSync Frontend
            org.opencontainers.image.description=Angular frontend for StewardSync racing steward reports application
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push deployer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/convex-deployer.Dockerfile
          push: true
          tags: ${{ steps.meta-deployer.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ steps.tags.outputs.tag }}
            org.opencontainers.image.title=StewardSync Convex Deployer
            org.opencontainers.image.description=Convex function deployer for StewardSync
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Built Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.tags.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.DOCKER_USERNAME }}/stewardsync:frontend-${{ steps.tags.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: \`${{ env.DOCKER_USERNAME }}/stewardsync:frontend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployer" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.tags.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.DOCKER_USERNAME }}/stewardsync:deployer-${{ steps.tags.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: \`${{ env.DOCKER_USERNAME }}/stewardsync:deployer-latest\`" >> $GITHUB_STEP_SUMMARY
