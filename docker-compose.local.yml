services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
      DASH_DOMAIN: ${DASH_DOMAIN:-dash.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    expose:
      - "3210"
      - "3211"
    environment:
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME:-stewardsync-local}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-https://api.localhost}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-https://api.localhost}
      RUST_LOG: ${CONVEX_RUST_LOG:-info}
      DOCUMENT_RETENTION_DELAY: ${CONVEX_DOCUMENT_RETENTION_DELAY:-172800}
    volumes:
      - convex_data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 20

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    expose:
      - "6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL:-https://api.localhost}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - stewardsync:frontend-latest
      shm_size: 1gb
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PUBLIC_CONVEX_URL: ${PUBLIC_CONVEX_URL:-https://api.localhost}
      PUBLIC_ENABLE_DEV_LOGIN: ${PUBLIC_ENABLE_DEV_LOGIN:-false}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  convex_data:
  caddy_data:
  caddy_config:
