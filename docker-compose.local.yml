# Local Convex Backend for StewardSync development
# Based on: https://github.com/get-convex/convex-backend/blob/main/self-hosted/docker/docker-compose.yml
#
# Usage:
#   Start:    npm run convex:local:start
#   Stop:     npm run convex:local:stop
#   Logs:     npm run convex:local:logs
#   Dev:      npm run dev:local
#
# Dashboard: http://localhost:6791
# Backend:   http://127.0.0.1:3210
# HTTP Actions: http://127.0.0.1:3211
#
# After starting, generate an admin key:
#   docker compose -f docker-compose.local.yml exec backend ./generate_admin_key.sh
#
# Then add the admin key to your .env.local:
#   CONVEX_SELF_HOSTED_ADMIN_KEY='<your generated key>'

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex_data:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - RUST_LOG=info
      - DOCUMENT_RETENTION_DELAY=172800
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

volumes:
  convex_data:
