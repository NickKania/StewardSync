services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${CONVEX_API_PORT:-3210}:3210"
      - "${CONVEX_ACTIONS_PORT:-3211}:3211"
    environment:
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME:-stewardsync-local}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      RUST_LOG: ${CONVEX_RUST_LOG:-info}
      DOCUMENT_RETENTION_DELAY: ${CONVEX_DOCUMENT_RETENTION_DELAY:-172800}
    volumes:
      - convex_data:/convex/data
      - convex_shared:/convex/shared
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 20

  convex-keygen:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: "no"
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME:-stewardsync-local}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - convex_data:/convex/data
      - convex_shared:/convex/shared
    entrypoint:
      - /bin/sh
      - -ceu
    command:
      - |
        ADMIN_KEY="$(./generate_admin_key.sh | tail -n 1)"
        printf "%s" "$$ADMIN_KEY" > /convex/shared/admin_key
        chmod 600 /convex/shared/admin_key
        echo "Convex admin key written to /convex/shared/admin_key"

  convex-deployer:
    build:
      context: .
      dockerfile: docker/convex-deployer.Dockerfile
    restart: "no"
    environment:
      CONVEX_SELF_HOSTED_URL: http://backend:3210
    volumes:
      - convex_shared:/convex/shared:ro
    depends_on:
      backend:
        condition: service_healthy
      convex-keygen:
        condition: service_completed_successfully

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${CONVEX_DASHBOARD_PORT:-6791}:6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL:-http://127.0.0.1:3210}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4200}:80"
    environment:
      PUBLIC_CONVEX_URL: ${PUBLIC_CONVEX_URL:-http://localhost:3210}
      PUBLIC_ENABLE_DEV_LOGIN: ${PUBLIC_ENABLE_DEV_LOGIN:-false}
    depends_on:
      backend:
        condition: service_healthy
      convex-deployer:
        condition: service_completed_successfully

volumes:
  convex_data:
  convex_shared:
